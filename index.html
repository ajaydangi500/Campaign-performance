<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Dashboard - LinkedIn Campaign</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; background: #f4f6f9; }
    h1 { margin-bottom: 10px; }
    .kpi-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
    .kpi { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .kpi h3 { margin: 0; font-size: 14px; color: #666; }
    .kpi p { font-size: 20px; margin: 5px 0 0; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<h1>LinkedIn Campaign Performance Dashboard</h1>
<p><strong>Campaign:</strong> FY26_Q3_EMEA_AIPowerDays</p>

<div class="kpi-container">
  <div class="kpi"><h3>Spend</h3><p id="spend"></p></div>
  <div class="kpi"><h3>CTR</h3><p id="ctr"></p></div>
  <div class="kpi"><h3>CPC</h3><p id="cpc"></p></div>
  <div class="kpi"><h3>Conversions</h3><p id="conv"></p></div>
  <div class="kpi"><h3>Frequency</h3><p id="freq"></p></div>
</div>

<div class="grid">
  <div class="card"><div id="efficiency"></div></div>
  <div class="card"><div id="funnel"></div></div>
  <div class="card"><div id="frequencyChart"></div></div>
  <div class="card"><div id="engagement"></div></div>
  <div class="card"><div id="reach"></div></div>
</div>

<script>
// Embedded JSON data
const data = {
  "Total Spent": "5537.54",
  "Click Through Rate": "1.16%",
  "Average CPC": "0.94",
  "Conversions": 0,
  "Average Frequency": 11.03,
  "Average CPM": 10.88,
  "Impressions": 508802,
  "Clicks": 5903,
  "Engagement Rate": "1.17%",
  "Reactions": 5,
  "Comments": 0,
  "Shares": 0,
  "Reach": 46102,
  "Audience Penetration": "0.70%"
};

function clean(val) {
  return parseFloat(String(val).replace('%','').replace(/,/g,'')) || 0;
}

// KPIs
document.getElementById('spend').innerText = "£" + data["Total Spent"];
document.getElementById('ctr').innerText = data["Click Through Rate"];
document.getElementById('cpc').innerText = "£" + data["Average CPC"];
document.getElementById('conv').innerText = data["Conversions"];
document.getElementById('freq').innerText = data["Average Frequency"];

// Charts
Plotly.newPlot('efficiency', [
  { x: ['CPM', 'CPC'], y: [clean(data["Average CPM"]), clean(data["Average CPC"])], type: 'bar' },
  { x: ['CTR'], y: [clean(data["Click Through Rate"])], type: 'scatter', yaxis: 'y2' }
], { title: 'Spend Efficiency', yaxis2: { overlaying: 'y', side: 'right' }});

Plotly.newPlot('funnel', [{
  type: 'funnel',
  y: ['Impressions', 'Clicks', 'Conversions'],
  x: [data.Impressions, data.Clicks, data.Conversions]
}], { title: 'Conversion Funnel' });

Plotly.newPlot('frequencyChart', [{
  x: [data["Average Frequency"]],
  y: [clean(data["Engagement Rate"])],
  mode: 'markers',
  type: 'scatter'
}], { title: 'Frequency vs Engagement' });

Plotly.newPlot('engagement', [{
  x: ['Reactions', 'Comments', 'Shares'],
  y: [data.Reactions, data.Comments, data.Shares],
  type: 'bar'
}], { title: 'Engagement Breakdown' });

Plotly.newPlot('reach', [{
  values: [clean(data["Audience Penetration"]), 100 - clean(data["Audience Penetration"])],
  labels: ['Penetration', 'Remaining'],
  type: 'pie'
}], { title: 'Audience Penetration' });
</script>

</body>
</html>
